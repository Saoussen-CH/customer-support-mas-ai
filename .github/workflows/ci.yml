name: CI Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'  # Nightly at midnight UTC

env:
  PYTHON_VERSION: "3.11"

jobs:
  # =============================================================================
  # Lint Check
  # =============================================================================
  lint:
    name: Lint Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Run ruff linter
        run: uv run ruff check customer_support_agent/ --ignore=E501

      - name: Run ruff formatter check
        run: uv run ruff format customer_support_agent/ --check

  # =============================================================================
  # Tool Tests - Direct tool testing with mocked Firestore (free, fast)
  # =============================================================================
  tool-tests:
    name: Tool Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Setup GCP credentials
        run: |
          echo '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}' > /tmp/gcp-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json" >> $GITHUB_ENV

      - name: Run tool tests
        run: |
          uv run pytest tests/unit/test_tools.py tests/unit/test_mock_rag.py tests/unit/test_refund_standalone.py -v --tb=short
        env:
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
          FIRESTORE_DATABASE: ${{ secrets.FIRESTORE_DATABASE }}

  # =============================================================================
  # Unit Agent Evals - Uses Vertex AI Gemini API
  #
  # EVAL_PROFILE selection:
  #   pull_request      → fast     (Rouge-1 only, free, ~30s)
  #   push to main      → standard (+ tool_trajectory, free)
  #   schedule/dispatch  → full    (+ LLM-as-judge response quality)
  # =============================================================================
  unit-tests:
    name: Unit Agent Evaluation
    runs-on: ubuntu-latest
    needs: [tool-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Setup GCP credentials
        run: |
          echo '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}' > /tmp/gcp-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json" >> $GITHUB_ENV

      - name: Run unit agent evaluations
        run: |
          uv run pytest tests/unit/test_agent_eval_ci.py -v --tb=short
        env:
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
          GOOGLE_CLOUD_LOCATION: ${{ secrets.GOOGLE_CLOUD_LOCATION }}
          FIRESTORE_DATABASE: ${{ secrets.FIRESTORE_DATABASE }}
          GOOGLE_GENAI_USE_VERTEXAI: "True"
          EVAL_PROFILE: ${{ github.event_name == 'pull_request' && 'fast' || (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && 'full' || 'standard' }}

  # =============================================================================
  # Integration Agent Evals - Full multi-agent workflow evaluation
  #
  # EVAL_PROFILE selection:
  #   pull_request      → fast     (Rouge-1 only, free, ~30s)
  #   push to main      → standard (+ rubric-based LLM judge for tool use)
  #   schedule/dispatch  → full    (+ LLM-as-judge response quality)
  # =============================================================================
  integration-tests:
    name: Integration Evaluation
    runs-on: ubuntu-latest
    needs: [unit-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Setup GCP credentials
        run: |
          echo '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}' > /tmp/gcp-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json" >> $GITHUB_ENV

      - name: Run integration evaluations
        run: |
          uv run pytest tests/integration/test_integration_eval_ci.py -v --tb=short
        env:
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
          GOOGLE_CLOUD_LOCATION: ${{ secrets.GOOGLE_CLOUD_LOCATION }}
          FIRESTORE_DATABASE: ${{ secrets.FIRESTORE_DATABASE }}
          GOOGLE_GENAI_USE_VERTEXAI: "True"
          EVAL_PROFILE: ${{ github.event_name == 'pull_request' && 'fast' || (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && 'full' || 'standard' }}
