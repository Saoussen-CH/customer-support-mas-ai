# Nightly Post-Deploy Eval — Triggered by Cloud Scheduler or manual dispatch
#
# Evaluates the deployed Agent Engine via Vertex AI Gen AI Eval Service.
# Runs nightly at midnight UTC against the live prod Agent Engine.
#
# Substitutions (set in Cloud Build trigger config):
#   _AGENT_ENGINE_RESOURCE_NAME — full resource name of the deployed Agent Engine
#   _STAGING_BUCKET             — GCS bucket for eval artifacts (gs://...)

substitutions:
  _PYTHON_VERSION: "3.11"
  _FIRESTORE_DATABASE: "customer-support-db"
  _GOOGLE_CLOUD_LOCATION: "us-central1"
  _AGENT_ENGINE_RESOURCE_NAME: ""
  _STAGING_BUCKET: ""
  _EVAL_PROFILE: "full"

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # ===========================================================================
  # Install dependencies
  # ===========================================================================
  - id: "install-deps"
    name: "python:${_PYTHON_VERSION}-slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        pip install uv --quiet &&
        uv sync --frozen --group dev
    waitFor: ["-"]

  # ===========================================================================
  # Post-Deploy Eval — Vertex AI Gen AI Eval Service against live Agent Engine
  # ===========================================================================
  - id: "post-deploy-eval"
    name: "python:${_PYTHON_VERSION}-slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        export PATH="/workspace/.venv/bin:$$PATH"

        # Extract engine ID from full resource name
        ENGINE_ID=$(echo "${_AGENT_ENGINE_RESOURCE_NAME}" | awk -F'/' '{print $NF}')

        python scripts/eval_vertex.py \
          --agent-engine-id "$$ENGINE_ID" \
          --profile "${_EVAL_PROFILE}" \
          --delay 5
    env:
      - "GOOGLE_CLOUD_PROJECT=$PROJECT_ID"
      - "GOOGLE_CLOUD_LOCATION=${_GOOGLE_CLOUD_LOCATION}"
      - "FIRESTORE_DATABASE=${_FIRESTORE_DATABASE}"
      - "GOOGLE_CLOUD_STORAGE_BUCKET=${_STAGING_BUCKET}"
      - "GOOGLE_GENAI_USE_VERTEXAI=True"
    waitFor: ["install-deps"]

timeout: "3600s"
