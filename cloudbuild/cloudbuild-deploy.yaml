# CI + CD Pipeline — Used by push to main trigger
#
# Two Cloud Build triggers point to this file:
#
#   Trigger 1 — agent code changed (includedFiles: customer_support_agent/**)
#     _DEPLOY_AGENT_ENGINE=true
#
#   Trigger 2 — everything else (ignoredFiles: customer_support_agent/**)
#     _DEPLOY_AGENT_ENGINE=false
#
# Ordering:
#   CI (install → lint + tool-tests → unit-tests → integration-tests)
#     → docker-build + push
#       → deploy-agent-engine (if enabled)   ← agent first
#         → deploy-cloud-run                 ← cloud run second
#           → smoke-test

substitutions:
  _EVAL_PROFILE: "standard"
  _PYTHON_VERSION: "3.11"
  _FIRESTORE_DATABASE: "customer-support-db"
  _GOOGLE_CLOUD_LOCATION: "us-central1"
  _REGION: "us-central1"
  _SERVICE_NAME: "customer-support-app"
  _AR_REPO: "customer-support"
  _DEPLOY_AGENT_ENGINE: "false"
  _STAGING_BUCKET: ""
  _AGENT_ENGINE_RESOURCE_NAME: ""
  _AGENT_ENGINE_DISPLAY_NAME: "customer-support-multiagent"
  _MODEL_ARMOR_ENABLED: "false"
  _MODEL_ARMOR_TEMPLATE_ID: ""

options:
  logging: CLOUD_LOGGING_ONLY

# ═══════════════════════════════════════════════════════════════════════════════
# CI STEPS
# ═══════════════════════════════════════════════════════════════════════════════

steps:
  # ===========================================================================
  # Install dependencies into shared /workspace/.venv
  # ===========================================================================
  - id: "install-deps"
    name: "python:${_PYTHON_VERSION}-slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        pip install uv --quiet &&
        uv sync --frozen --group dev
    waitFor: ["-"]

  # ===========================================================================
  # Lint (parallel with tool-tests)
  # ===========================================================================
  - id: "lint"
    name: "python:${_PYTHON_VERSION}-slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        export PATH="/workspace/.venv/bin:$$PATH"
        ruff check customer_support_agent/ --ignore=E501
    waitFor: ["install-deps"]

  # ===========================================================================
  # Tool Tests (parallel with lint)
  # ===========================================================================
  - id: "tool-tests"
    name: "python:${_PYTHON_VERSION}-slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        export PATH="/workspace/.venv/bin:$$PATH"
        pytest tests/unit/test_tools.py tests/unit/test_mock_rag.py tests/unit/test_refund_standalone.py -v --tb=short
    env:
      - "GOOGLE_CLOUD_PROJECT=$PROJECT_ID"
      - "GOOGLE_CLOUD_LOCATION=${_GOOGLE_CLOUD_LOCATION}"
      - "FIRESTORE_DATABASE=${_FIRESTORE_DATABASE}"
      - "GOOGLE_GENAI_USE_VERTEXAI=True"
    waitFor: ["install-deps"]

  # ===========================================================================
  # Unit Agent Evaluation (after tool-tests)
  # ===========================================================================
  - id: "unit-tests"
    name: "python:${_PYTHON_VERSION}-slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        export PATH="/workspace/.venv/bin:$$PATH"
        pytest tests/unit/test_agent_eval_ci.py -v --tb=short
    env:
      - "GOOGLE_CLOUD_PROJECT=$PROJECT_ID"
      - "GOOGLE_CLOUD_LOCATION=${_GOOGLE_CLOUD_LOCATION}"
      - "FIRESTORE_DATABASE=${_FIRESTORE_DATABASE}"
      - "GOOGLE_GENAI_USE_VERTEXAI=True"
      - "EVAL_PROFILE=${_EVAL_PROFILE}"
    waitFor: ["tool-tests"]

  # ===========================================================================
  # Integration Evaluation (after unit-tests)
  # ===========================================================================
  - id: "integration-tests"
    name: "python:${_PYTHON_VERSION}-slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        export PATH="/workspace/.venv/bin:$$PATH"
        pytest tests/integration/test_integration_eval_ci.py -v --tb=short
    env:
      - "GOOGLE_CLOUD_PROJECT=$PROJECT_ID"
      - "GOOGLE_CLOUD_LOCATION=${_GOOGLE_CLOUD_LOCATION}"
      - "FIRESTORE_DATABASE=${_FIRESTORE_DATABASE}"
      - "GOOGLE_GENAI_USE_VERTEXAI=True"
      - "EVAL_PROFILE=${_EVAL_PROFILE}"
    waitFor: ["unit-tests"]

  # ═══════════════════════════════════════════════════════════════════════════
  # CD STEPS — Only run after all CI passes
  # ═══════════════════════════════════════════════════════════════════════════

  # ===========================================================================
  # Docker Build (multi-stage: React frontend + FastAPI backend)
  # Runs in parallel with the tail end of CI (after integration-tests + lint)
  # ===========================================================================
  - id: "docker-build"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:$COMMIT_SHA"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:latest"
      - "-f"
      - "backend/Dockerfile"
      - "."
    waitFor: ["integration-tests", "lint"]

  # ===========================================================================
  # Push to Artifact Registry
  # ===========================================================================
  - id: "docker-push"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}"
    waitFor: ["docker-build"]

  # ===========================================================================
  # Deploy Agent Engine (optional — enabled by Trigger 1 when agent code changes)
  # Must run BEFORE Cloud Run so Cloud Run always talks to the updated agent.
  # On update: same resource name — Cloud Run needs no change.
  # On first create: resource name saved to Secret Manager for Cloud Run to read.
  # ===========================================================================
  - id: "deploy-agent-engine"
    name: "python:${_PYTHON_VERSION}-slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        if [ "${_DEPLOY_AGENT_ENGINE}" != "true" ]; then
          echo "Skipping Agent Engine deploy (_DEPLOY_AGENT_ENGINE != true)"
          exit 0
        fi
        export PATH="/workspace/.venv/bin:$$PATH"
        python deployment/deploy.py --action deploy
    env:
      - "GOOGLE_CLOUD_PROJECT=$PROJECT_ID"
      - "GOOGLE_CLOUD_LOCATION=${_REGION}"
      - "FIRESTORE_DATABASE=${_FIRESTORE_DATABASE}"
      - "GOOGLE_CLOUD_STORAGE_BUCKET=${_STAGING_BUCKET}"
      - "PROJECT_NUMBER=$PROJECT_NUMBER"
      - "AGENT_ENGINE_DISPLAY_NAME=${_AGENT_ENGINE_DISPLAY_NAME}"
    waitFor: ["docker-push"]

  # ===========================================================================
  # Deploy to Cloud Run
  # AGENT_ENGINE_RESOURCE_NAME passed as substitution _AGENT_ENGINE_RESOURCE_NAME
  # (read from .env by make submit-build, or set in trigger substitutions).
  # Runs after deploy-agent-engine so it always gets the latest resource name.
  # ===========================================================================
  - id: "deploy-cloud-run"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        # Use resource name written by deploy-agent-engine (first create),
        # or fall back to the substitution value from .env (updates).
        if [ -f /workspace/agent_engine_resource_name.txt ]; then
          RESOURCE_NAME=$(cat /workspace/agent_engine_resource_name.txt)
          echo "Using resource name from deploy-agent-engine: $$RESOURCE_NAME"
        else
          RESOURCE_NAME="${_AGENT_ENGINE_RESOURCE_NAME}"
          echo "Using resource name from substitution: $$RESOURCE_NAME"
        fi
        gcloud run deploy ${_SERVICE_NAME} \
          --image="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:$COMMIT_SHA" \
          --region="${_REGION}" \
          --platform=managed \
          --allow-unauthenticated \
          --set-env-vars="GOOGLE_CLOUD_PROJECT=$PROJECT_ID,FIRESTORE_DATABASE=${_FIRESTORE_DATABASE},GOOGLE_CLOUD_LOCATION=${_REGION},GOOGLE_GENAI_USE_VERTEXAI=True,ENVIRONMENT=production,AGENT_ENGINE_RESOURCE_NAME=$$RESOURCE_NAME,MODEL_ARMOR_ENABLED=${_MODEL_ARMOR_ENABLED},MODEL_ARMOR_TEMPLATE_ID=${_MODEL_ARMOR_TEMPLATE_ID}" \
          --memory=1Gi \
          --cpu=1 \
          --min-instances=0 \
          --max-instances=10 \
          --port=8080
    waitFor: ["deploy-agent-engine"]

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:$COMMIT_SHA"
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:latest"

timeout: "3600s"
