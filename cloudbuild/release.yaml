# Release Pipeline — Triggered by git tag push (v*)
#
# What this does:
#   1. Lint + unit tests (EVAL_PROFILE=standard) — gate before any deploy
#   2. Build Docker image tagged with $TAG_NAME, $COMMIT_SHA, and latest
#   3. Always deploys Agent Engine (versioned display name: customer-support-multiagent-vX.Y.Z)
#   4. Deploys Cloud Run using the versioned image tag
#   5. Runs smoke tests against the deployed Cloud Run URL
#
# Agent Engine versioning (Option 3):
#   - The resource name stays stable (Cloud Run needs no change on updates)
#   - The display name captures the version: "customer-support-multiagent-v1.0.0"
#   - The Docker image is tagged with the git tag in Artifact Registry for rollback
#   - Rollback = re-trigger release pipeline on the old tag or manually redeploy
#     the old image: gcloud run deploy ... --image=...:<old-tag>
#
# Ordering:
#   install-deps + detect-version
#     → lint + unit-tests (parallel)
#       → docker-build
#         → docker-push
#           → deploy-agent-engine   ← agent first (resource name stable)
#             → deploy-cloud-run    ← cloud run second
#               → smoke-test

substitutions:
  _PYTHON_VERSION: "3.11"
  _FIRESTORE_DATABASE: "customer-support-db"
  _GOOGLE_CLOUD_LOCATION: "us-central1"
  _REGION: "us-central1"
  _SERVICE_NAME: "customer-support-app"
  _AR_REPO: "customer-support"
  _STAGING_BUCKET: ""
  _AGENT_ENGINE_RESOURCE_NAME: ""
  _MODEL_ARMOR_ENABLED: "false"
  _MODEL_ARMOR_TEMPLATE_ID: ""

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # ===========================================================================
  # Install dependencies
  # ===========================================================================
  - id: "install-deps"
    name: "python:${_PYTHON_VERSION}-slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        pip install uv --quiet &&
        uv sync --frozen --group dev
    waitFor: ["-"]

  # ===========================================================================
  # Lint
  # ===========================================================================
  - id: "lint"
    name: "python:${_PYTHON_VERSION}-slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        export PATH="/workspace/.venv/bin:$$PATH"
        ruff check customer_support_agent/ --ignore=E501
    waitFor: ["install-deps"]

  # ===========================================================================
  # Unit tests — standard profile (stronger gate for a release)
  # ===========================================================================
  - id: "unit-tests"
    name: "python:${_PYTHON_VERSION}-slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        export PATH="/workspace/.venv/bin:$$PATH"
        pytest tests/unit/test_tools.py tests/unit/test_mock_rag.py \
               tests/unit/test_refund_standalone.py \
               tests/unit/test_agent_eval_ci.py -v --tb=short
    env:
      - "GOOGLE_CLOUD_PROJECT=$PROJECT_ID"
      - "GOOGLE_CLOUD_LOCATION=${_GOOGLE_CLOUD_LOCATION}"
      - "FIRESTORE_DATABASE=${_FIRESTORE_DATABASE}"
      - "GOOGLE_GENAI_USE_VERTEXAI=True"
      - "EVAL_PROFILE=standard"
    waitFor: ["install-deps"]

  # ===========================================================================
  # Build Docker image — tag with $TAG_NAME, $COMMIT_SHA, and latest
  # ===========================================================================
  - id: "docker-build"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:$TAG_NAME"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:$COMMIT_SHA"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:latest"
      - "-f"
      - "backend/Dockerfile"
      - "."
    waitFor: ["lint", "unit-tests"]

  # ===========================================================================
  # Push all tags to Artifact Registry
  # ===========================================================================
  - id: "docker-push"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}"
    waitFor: ["docker-build"]

  # ===========================================================================
  # Deploy Agent Engine — always deploy on release (versioned display name)
  # ===========================================================================
  - id: "deploy-agent-engine"
    name: "python:${_PYTHON_VERSION}-slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        export PATH="/workspace/.venv/bin:$$PATH"
        python deployment/deploy.py --action deploy
    env:
      - "GOOGLE_CLOUD_PROJECT=$PROJECT_ID"
      - "GOOGLE_CLOUD_LOCATION=${_REGION}"
      - "FIRESTORE_DATABASE=${_FIRESTORE_DATABASE}"
      - "GOOGLE_CLOUD_STORAGE_BUCKET=${_STAGING_BUCKET}"
      - "PROJECT_NUMBER=$PROJECT_NUMBER"
      - "AGENT_ENGINE_DISPLAY_NAME=customer-support-multiagent-$TAG_NAME"
      - "MODEL_ARMOR_ENABLED=${_MODEL_ARMOR_ENABLED}"
      - "MODEL_ARMOR_TEMPLATE_ID=${_MODEL_ARMOR_TEMPLATE_ID}"
    waitFor: ["docker-push"]

  # ===========================================================================
  # Deploy Cloud Run — use the versioned image tag ($TAG_NAME)
  # ===========================================================================
  - id: "deploy-cloud-run"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        # Prefer resource name written by deploy-agent-engine (first create),
        # fall back to substitution value from trigger config (updates).
        if [ -f /workspace/agent_engine_resource_name.txt ]; then
          RESOURCE_NAME=$(cat /workspace/agent_engine_resource_name.txt)
          echo "Using resource name from deploy-agent-engine: $$RESOURCE_NAME"
        else
          RESOURCE_NAME="${_AGENT_ENGINE_RESOURCE_NAME}"
          echo "Using resource name from substitution: $$RESOURCE_NAME"
        fi
        gcloud run deploy ${_SERVICE_NAME} \
          --image="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:$TAG_NAME" \
          --region="${_REGION}" \
          --platform=managed \
          --allow-unauthenticated \
          --set-env-vars="GOOGLE_CLOUD_PROJECT=$PROJECT_ID,FIRESTORE_DATABASE=${_FIRESTORE_DATABASE},GOOGLE_CLOUD_LOCATION=${_REGION},GOOGLE_GENAI_USE_VERTEXAI=True,ENVIRONMENT=production,AGENT_ENGINE_RESOURCE_NAME=$$RESOURCE_NAME,MODEL_ARMOR_ENABLED=${_MODEL_ARMOR_ENABLED},MODEL_ARMOR_TEMPLATE_ID=${_MODEL_ARMOR_TEMPLATE_ID},RELEASE_VERSION=$TAG_NAME" \
          --memory=1Gi \
          --cpu=1 \
          --min-instances=0 \
          --max-instances=10 \
          --port=8080
    waitFor: ["deploy-agent-engine"]

  # ===========================================================================
  # Smoke tests — verify the release is live and responding
  # ===========================================================================
  - id: "smoke-test"
    name: "python:${_PYTHON_VERSION}-slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        export PATH="/workspace/.venv/bin:$$PATH"
        CLOUD_RUN_URL=$(gcloud run services describe ${_SERVICE_NAME} \
          --region=${_REGION} \
          --project=$PROJECT_ID \
          --format="value(status.url)")
        echo "Smoke testing: $$CLOUD_RUN_URL"
        CLOUD_RUN_URL=$$CLOUD_RUN_URL pytest tests/smoke/ -v --tb=short
    waitFor: ["deploy-cloud-run"]

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:$TAG_NAME"
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:$COMMIT_SHA"
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:latest"

timeout: "3600s"
