# PR Check Pipeline — Used by pull_request triggers against main
# Fast feedback loop: lint + format check + tool tests + agent eval (Rouge-1 only)
#
# Trigger: Pull Request to main → _EVAL_PROFILE=fast
#
# Step execution order:
#   install-deps
#       ├── lint        (ruff check + ruff format --check)
#       └── tool-tests  (pure Python, no LLM)
#               └── unit-tests        (EVAL_PROFILE=fast)
#                       └── integration-tests (EVAL_PROFILE=fast)

substitutions:
  _EVAL_PROFILE: "fast"
  _PYTHON_VERSION: "3.11"
  _FIRESTORE_DATABASE: "customer-support-db"
  _GOOGLE_CLOUD_LOCATION: "us-central1"

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # ===========================================================================
  # Install dependencies via uv (reproducible from uv.lock)
  # ===========================================================================
  - id: "install-deps"
    name: "python:${_PYTHON_VERSION}-slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        pip install uv --quiet &&
        uv sync --frozen --group dev &&
        cp -r .venv /workspace/.venv
    waitFor: ["-"]

  # ===========================================================================
  # Lint — ruff check + ruff format --check (mirrors .pre-commit-config.yaml)
  # Runs in parallel with tool-tests
  # ===========================================================================
  - id: "lint"
    name: "python:${_PYTHON_VERSION}-slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        export PATH="/workspace/.venv/bin:$$PATH"
        ruff check customer_support_agent/ --ignore=E501 &&
        ruff format customer_support_agent/ --check
    waitFor: ["install-deps"]

  # ===========================================================================
  # Tool Tests — pure Python, mocked Firestore, no LLM calls
  # Runs in parallel with lint
  # ===========================================================================
  - id: "tool-tests"
    name: "python:${_PYTHON_VERSION}-slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        export PATH="/workspace/.venv/bin:$$PATH"
        pytest tests/unit/test_tools.py tests/unit/test_mock_rag.py tests/unit/test_refund_standalone.py -v --tb=short
    env:
      - "GOOGLE_CLOUD_PROJECT=$PROJECT_ID"
      - "GOOGLE_CLOUD_LOCATION=${_GOOGLE_CLOUD_LOCATION}"
      - "FIRESTORE_DATABASE=${_FIRESTORE_DATABASE}"
      - "GOOGLE_GENAI_USE_VERTEXAI=True"
    waitFor: ["install-deps"]

  # ===========================================================================
  # Unit Agent Evaluation — EVAL_PROFILE=fast (Rouge-1 only, no LLM judge)
  # ===========================================================================
  - id: "unit-tests"
    name: "python:${_PYTHON_VERSION}-slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        export PATH="/workspace/.venv/bin:$$PATH"
        pytest tests/unit/test_agent_eval_ci.py -v --tb=short
    env:
      - "GOOGLE_CLOUD_PROJECT=$PROJECT_ID"
      - "GOOGLE_CLOUD_LOCATION=${_GOOGLE_CLOUD_LOCATION}"
      - "FIRESTORE_DATABASE=${_FIRESTORE_DATABASE}"
      - "GOOGLE_GENAI_USE_VERTEXAI=True"
      - "EVAL_PROFILE=${_EVAL_PROFILE}"
    waitFor: ["tool-tests"]

  # ===========================================================================
  # Integration Evaluation — EVAL_PROFILE=fast (Rouge-1 only, no LLM judge)
  # ===========================================================================
  - id: "integration-tests"
    name: "python:${_PYTHON_VERSION}-slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        export PATH="/workspace/.venv/bin:$$PATH"
        pytest tests/integration/test_integration_eval_ci.py -v --tb=short
    env:
      - "GOOGLE_CLOUD_PROJECT=$PROJECT_ID"
      - "GOOGLE_CLOUD_LOCATION=${_GOOGLE_CLOUD_LOCATION}"
      - "FIRESTORE_DATABASE=${_FIRESTORE_DATABASE}"
      - "GOOGLE_GENAI_USE_VERTEXAI=True"
      - "EVAL_PROFILE=${_EVAL_PROFILE}"
    waitFor: ["unit-tests"]

# PR checks should complete well within 20 minutes with EVAL_PROFILE=fast
timeout: "1200s"
